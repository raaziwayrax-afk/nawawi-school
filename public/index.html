<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>NBS School System</title>
    <style>
        :root { --nav: #0f172a; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 250px; background: var(--nav); color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-left: 250px; flex: 1; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 5px; border: none; background: var(--accent); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div id="loginPage" style="position:fixed; inset:0; background:white; z-index:100; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:300px; text-align:center;">
        <h2>NBS LOGIN</h2>
        <input id="lID" placeholder="Admin ID">
        <input id="lPass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div class="sidebar">
    <h3>NAWAWI PRO</h3>
    <button onclick="showNav('attendance')" style="width:100%; margin-bottom:10px;">Attendance</button>
    <button onclick="showNav('exam')" style="width:100%; margin-bottom:10px;">Exams</button>
    <button onclick="showNav('add')" style="width:100%;">Add Student</button>
</div>

<div class="main">
    <div id="content"></div>
</div>

<script>
    async function login() {
        if(lID.value === 'nawawi_admin' && lPass.value === '7209379') {
            document.getElementById('loginPage').style.display='none';
            showNav('attendance');
        } else { alert("Khlad!"); }
    }

    function showNav(page) {
        let html = `<div class="card"><h3>${page.toUpperCase()}</h3>`;
        if(page === 'add') {
            html += `<input id="nID" placeholder="NBS Code"><input id="nName" placeholder="Name">
                     <select id="nCl"><option value="9aad">9aad</option><option value="12aad">12aad</option></select>
                     <button onclick="addNew()">Save Student</button>`;
        } else {
            html += `<select id="fC"><option value="9aad">9aad</option><option value="12aad">12aad</option></select>
                     <select id="fS"><option value="A">A</option><option value="B">B</option></select>
                     <button onclick="loadList('${page}')">Show Students</button>`;
        }
        html += `</div><div id="listArea"></div>`;
        document.getElementById('content').innerHTML = html;
    }

    async function loadList(type) {
        const res = await fetch(`/api/students/${fC.value}/${fS.value}`);
        const students = await res.json();
        if(students.length === 0) { 
            document.getElementById('listArea').innerHTML = "<p style='color:red'>Arday lama helin! Marka hore isticmaal 'Add Student'.</p>";
            return;
        }
        let table = `<table><tr><th>Name</th><th>Action</th></tr>`;
        students.forEach(s => {
            table += `<tr><td>${s.fullName}</td><td>`;
            if(type === 'attendance') {
                table += `<button onclick="mark('${s.nbsCode}', 'P')" style="background:green">Sax ✅</button> 
                          <button onclick="mark('${s.nbsCode}', 'A')" style="background:red">Khlad ❌</button>`;
            } else { table += `<button onclick="alert('Geli dhibcaha')">Enter Marks</button>`; }
            table += `</td></tr>`;
        });
        document.getElementById('listArea').innerHTML = table + `</table>`;
    }

    async function addNew() {
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nbsCode: nID.value, fullName: nName.value, class: nCl.value, section: "A" })
        });
        alert("Waa la keydiyey!");
    }

    async function mark(id, status) {
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nbsCode: id, attendance: [{ date: new Date().toLocaleDateString(), status }] })
        });
        alert("Saved!");
    }
</script>
</body>
</html>
