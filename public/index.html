<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi Pro | Official Global System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --red: #ef4444; --green: #22c55e; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        
        /* Login UI */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 20px; transition: 0.3s; }
        .sidebar button { width: 100%; padding: 15px; background: transparent; color: #cbd5e1; border: none; text-align: left; font-size: 16px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .sidebar button:hover, .sidebar button.active { background: var(--accent); color: white; }
        
        /* Main Area */
        .main { flex: 1; margin-left: 280px; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        /* Tables & Inputs */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color:var(--primary)">NAWAWI PRO</h2>
        <select id="role"><option value="student">Student Portal</option><option value="admin">Admin Portal</option></select>
        <input type="text" id="loginId" placeholder="NBS Code / Admin User">
        <input type="password" id="loginPass" placeholder="Password (123456)">
        <button class="btn-primary" onclick="auth()" style="width:100%; margin-top:20px;">Giri Portal-ka</button>
    </div>
</div>

<div id="sidebar" class="sidebar" style="display:none">
    <h2 style="text-align:center">NBS PRO</h2>
    <hr style="opacity: 0.1; margin-bottom: 20px;">
    <div id="menuItems"></div>
    <button onclick="location.reload()" style="color:var(--red); margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<div id="main" class="main" style="display:none">
    <div id="viewContainer"></div>
</div>

<script>
    let user = null;

    async function auth() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: role.value, id: loginId.value, pass: loginPass.value})
        });
        const data = await res.json();
        if(data.success) {
            user = data;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('main').style.display = 'block';
            data.role === 'admin' ? loadAdmin() : loadStudent();
        } else alert("Xogtu waa khalad!");
    }

    // --- Admin Module ---
    function loadAdmin() {
        document.getElementById('menuItems').innerHTML = `
            <button onclick="adminDashboard()"><i class="fas fa-th-large"></i> Manage Classes</button>
            <button onclick="addStudentForm()"><i class="fas fa-user-plus"></i> Add Student</button>
        `;
        adminDashboard();
    }

    function adminDashboard() {
        const container = document.getElementById('viewContainer');
        container.innerHTML = `
            <div class="card">
                <h3>Select Class & Section</h3>
                <div class="grid">
                    <select id="selC"><option value="9">Class 9</option><option value="12">Class 12</option></select>
                    <select id="selS"><option value="A">Section A</option><option value="B">Section B</option><option value="C">Section C</option><option value="D">Section D</option></select>
                    <button class="btn-primary" onclick="fetchClass()">Load List</button>
                </div>
            </div>
            <div id="adminList"></div>
        `;
    }

    async function fetchClass() {
        const res = await fetch(`/api/students/${selC.value}/${selS.value}`);
        const list = await res.json();
        let html = `<table><tr><th>ID</th><th>Name</th><th>Action</th></tr>`;
        list.forEach(s => {
            html += `<tr><td>${s.nbsCode}</td><td>${s.fullName}</td><td><button onclick='editSt(${JSON.stringify(s)})'>Edit</button></td></tr>`;
        });
        document.getElementById('adminList').innerHTML = html + `</table>`;
    }

    // --- Student Module ---
    function loadStudent() {
        const s = user.data;
        document.getElementById('menuItems').innerHTML = `
            <button onclick="stDash()"><i class="fas fa-home"></i> Dashboard (100%)</button>
            <button onclick="stAttendance()"><i class="fas fa-calendar-check"></i> Attendance</button>
            <button onclick="stFees()"><i class="fas fa-dollar-sign"></i> Fee Status</button>
            <button onclick="stExams()"><i class="fas fa-file-invoice"></i> Exam Results</button>
        `;
        stDash();
    }

    function stDash() {
        const s = user.data;
        document.getElementById('viewContainer').innerHTML = `
            <div class="card"><h1>Ku soo dhowaw, ${s.fullName}</h1><p>ID: ${s.nbsCode} | Class: ${s.class}${s.section}</p></div>
            <div class="grid">
                <div class="card" style="border-left:5px solid var(--green)"><h3>Attendance</h3><p>100% Active</p></div>
                <div class="card" style="border-left:5px solid var(--accent)"><h3>Fees</h3><p>$${s.fees.paid} Paid</p></div>
                <div class="card" style="border-left:5px solid orange"><h3>Exam Avg</h3><p>${s.exam.average || 0}%</p></div>
            </div>
        `;
    }

    function stAttendance() {
        document.getElementById('viewContainer').innerHTML = `<div class="card"><h3>Attendance History</h3><p>Bisha iyo Maalinta la qalday halkan bay ku soo muuqanayaan.</p></div>`;
    }
</script>
</body>
</html>
