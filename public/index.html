<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi School System</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        h2 { color: #333; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Diiwaangelinta Ardayda</h2>
    <input type="text" id="nbsCode" placeholder="Code-ka Ardayga (Tusaale: NBS/101)">
    <input type="text" id="fullName" placeholder="Magaca oo Dhammaystiran">
    
    <select id="classSelect">
        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
    </select>

    <select id="sectionSelect">
        <option value="A">Section A</option>
        <option value="B">Section B</option>
    </select>

    <input type="number" id="paidAmount" placeholder="Lacagta uu bixiyey ($)">
    
    <button onclick="saveStudent()">Keydi Ardayga</button>
</div>

<script>
    async function saveStudent() {
        const data = {
            nbsCode: document.getElementById('nbsCode').value,
            fullName: document.getElementById('fullName').value,
            class: document.getElementById('classSelect').value,
            section: document.getElementById('sectionSelect').value,
            fees: {
                paid: Number(document.getElementById('paidAmount').value) || 0,
                total: 1200
            }
        };

        if(!data.nbsCode || !data.fullName) return alert("Fadlan buuxi meelaha banaan!");

        try {
            const response = await fetch('http://localhost:3001/api/admin/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (result.success) {
                alert("✅ " + result.message);
                document.querySelectorAll('input').forEach(i => i.value = '');
            }
        } catch (err) {
            alert("❌ Cilad: Server-ka ma shaqaynayo!");
        }
    }
</script>

</body>
</html>
