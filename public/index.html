<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi School System | Pro v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nav: #0f172a; --accent: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--nav); color: white; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { color: var(--accent); text-align: center; margin-bottom: 30px; }
        .sidebar button { width: 100%; padding: 13px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-size: 15px; display: flex; align-items: center; gap: 10px; }
        .sidebar button:hover { background: var(--accent); color: white; }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn-p { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 14px; border-bottom: 1px solid #eee; text-align: left; }
        #loginPortal { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="loginPortal">
    <div class="card" style="width:350px; text-align:center;">
        <h2 style="margin:0 0 20px 0">NBS LOGIN</h2>
        <select id="role"><option value="admin">Admin Portal</option><option value="student">Student Portal</option></select>
        <input id="uID" placeholder="NBS Code ama Admin ID">
        <input id="uPass" type="password" placeholder="Password">
        <button class="btn-p" onclick="handleLogin()">Giri Dashboard-ka</button>
    </div>
</div>

<div id="sideNav" class="sidebar" style="display:none">
    <h2>NAWAWI PRO</h2>
    <button onclick="nav('attendance')"><i class="fas fa-calendar-check"></i> Attendance</button>
    <button onclick="nav('fee')"><i class="fas fa-money-check-alt"></i> Fee Management</button>
    <button onclick="nav('exam')"><i class="fas fa-chart-bar"></i> Exam & Ranking</button>
    <button onclick="showAddForm()"><i class="fas fa-user-plus"></i> Register Student</button>
    <button onclick="location.reload()" style="color:#ef4444; margin-top:80px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<div id="mainView" class="main" style="display:none">
    <div id="dynamicContent"></div>
</div>

<script>
    let activeRole = '';

    async function handleLogin() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: role.value, id: uID.value, pass: uPass.value})
        });
        const data = await res.json();
        if(data.success) {
            activeRole = data.role;
            document.getElementById('loginPortal').style.display = 'none';
            document.getElementById('sideNav').style.display = 'block';
            document.getElementById('mainView').style.display = 'block';
            if(activeRole === 'admin') nav('attendance'); else showStudentDashboard(data.data);
        } else alert("Invalid Login Details!");
    }

    function nav(type) {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card">
                <h3>System Management: ${type.toUpperCase()}</h3>
                <div style="display:flex; gap:10px; align-items:end;">
                    <div style="flex:1">Fasalka: 
                        <select id="fC">
                            <option value="9">Fasalka 9aad</option><option value="10">Fasalka 10aad</option>
                            <option value="11">Fasalka 11aad</option><option value="12">Fasalka 12aad</option>
                        </select>
                    </div>
                    <div style="flex:1">Section: 
                        <select id="fS"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
                    </div>
                    <button class="btn-p" style="width:auto; margin:0; padding:12px 25px" onclick="loadList('${type}')">Show List</button>
                </div>
            </div>
            <div id="listArea"></div>
        `;
    }

    async function loadList(type) {
        const res = await fetch(`/api/students/${fC.value}/${fS.value}`);
        const students = await res.json();
        let html = `<div class="card"><table><tr><th>Magaca Ardayga</th>`;
        
        if(type === 'attendance') {
            html += `<th>Status</th><th>Action</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td><select id="at-${s.nbsCode}"><option value="P">P (Present)</option><option value="A">A (Absent)</option></select></td>
                <td><button onclick="saveAdminData('${s.nbsCode}', 'att')">Save</button></td></tr>`;
            });
        } else if(type === 'fee') {
            html += `<th>Paid ($)</th><th>Balance</th><th>Action</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td>$${s.fees.paid}</td><td>$${1200 - s.fees.paid}</td><td><button onclick="saveAdminData('${s.nbsCode}', 'fee')">Update</button></td></tr>`;
            });
        } else if(type === 'exam') {
            html += `<th>Avg %</th><th>Rank</th><th>Action</th></tr>`;
            students.sort((a,b) => (b.exam.average || 0) - (a.exam.average || 0));
            students.forEach((s, i) => {
                html += `<tr><td>${s.fullName}</td><td>${s.exam.average || 0}%</td><td>#${i+1}</td><td><button onclick="editExam('${s.nbsCode}')">Edit 12 Subjects</button></td></tr>`;
            });
        }
        document.getElementById('listArea').innerHTML = html + `</table></div>`;
    }

    async function saveAdminData(id, mode) {
        let payload = { nbsCode: id };
        if(mode === 'att') {
            payload.attendance = [{ date: new Date().toLocaleDateString(), status: document.getElementById(`at-${id}`).value }];
        } else if(mode === 'fee') {
            const amount = prompt("Geli lacagta:");
            if(!amount) return;
            payload.fees = { paid: Number(amount) };
        }
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("Success!");
        if(mode === 'fee') loadList('fee');
    }

    function showAddForm() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card" style="max-width:500px; margin:auto">
                <h3>Register New Student</h3>
                <input id="nc" placeholder="NBS Code (Ex: NBS001)">
                <input id="nn" placeholder="Full Name">
                <select id="ncl"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select>
                <select id="nsc"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
                <button class="btn-p" onclick="submitNew()">Save Student</button>
            </div>`;
    }

    async function submitNew() {
        const payload = { nbsCode: nc.value, fullName: nn.value, class: ncl.value, section: nsc.value };
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("Ardayga waa la keydiyey!");
        nav('attendance');
    }

    async function editExam(id) {
        const res = await fetch(`/api/student/${id}`);
        const s = await res.json();
        const subjects = ["Math", "English", "Arabic", "Islamic", "Physics", "Chemistry", "Biology", "History", "Geography", "Somali", "ICT", "Business"];
        
        let inputs = subjects.map((name, i) => {
            let score = (s.exam && s.exam.subjects ? s.exam.subjects.find(x => x.name === name) : null) || {score: 0};
            return `<div style="display:flex; gap:10px; margin-top:5px"><span style="flex:2">${name}</span><input id="score-${i}" type="number" value="${score.score}" style="flex:1"></div>`;
        }).join('');

        document.getElementById('dynamicContent').innerHTML = `
            <div class="card">
                <h3>Edit Grades: ${s.fullName}</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">${inputs}</div>
                <button class="btn-p" onclick="saveExamResults('${id}')">Save & Update Rank</button>
            </div>`;
    }

    async function saveExamResults(id) {
        const subNames = ["Math", "English", "Arabic", "Islamic", "Physics", "Chemistry", "Biology", "History", "Geography", "Somali", "ICT", "Business"];
        let subs = [];
        for(let i=0; i<12; i++) {
            subs.push({ name: subNames[i], score: Number(document.getElementById(`score-${i}`).value) });
        }
        let avg = (subs.reduce((a,b) => a + b.score, 0) / 12).toFixed(2);
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nbsCode: id, exam: { subjects: subs, average: avg } })
        });
        alert("Grades Updated!");
        nav('exam');
    }

    function showStudentDashboard(s) {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card">
                <h1>Ku soo dhowaw, ${s.fullName}</h1>
                <p>NBS ID: ${s.nbsCode} | Fasal: ${s.class}${s.section}</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="card" style="background:var(--accent); color:white; text-align:center;"><h3>AVERAGE</h3><h2>${s.exam.average || 0}%</h2></div>
                    <div class="card" style="text-align:center;"><h3>FEES</h3><h2>${s.fees.paid >= 1200 ? 'PAID' : 'UNPAID'}</h2></div>
                </div>
            </div>`;
    }
</script>
</body>
</html>
