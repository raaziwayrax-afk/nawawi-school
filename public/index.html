<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawawi School System | Enterprise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nav-bg: #0f172a; --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); }
        
        /* Sidebar Design */
        .sidebar { width: 280px; background: var(--nav-bg); color: white; height: 100vh; position: fixed; padding: 25px; box-sizing: border-box; transition: 0.3s; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 24px; letter-spacing: 1px; }
        .sidebar button { width: 100%; padding: 15px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 12px; margin-bottom: 10px; font-size: 16px; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .sidebar button i { width: 20px; }
        .sidebar button:hover, .sidebar button.active { background: var(--primary); color: white; }

        /* Main Content Area */
        .main-content { margin-left: 280px; flex: 1; padding: 40px; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 30px; }
        
        /* Forms & Inputs */
        input, select { width: 100%; padding: 12px 15px; margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .btn-p { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; font-size: 16px; margin-top: 20px; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4); }
        
        /* Table Design */
        table { width: 100%; border-collapse: collapse; margin-top: 25px; border-radius: 12px; overflow: hidden; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-weight: 600; color: #64748b; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #f8fafc; }

        /* Login Overlay */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        
        /* Grids */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="card" style="width: 380px; text-align: center;">
        <i class="fas fa-school" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2 style="margin: 0 0 25px 0;">NBS PORTAL</h2>
        <select id="loginRole">
            <option value="admin">Administrator</option>
            <option value="student">Student / Arday</option>
        </select>
        <input id="loginID" type="text" placeholder="Geli NBS Code / Admin ID">
        <input id="loginPass" type="password" placeholder="Geli Password">
        <button class="btn-p" onclick="processLogin()">Login to Dashboard</button>
    </div>
</div>

<div id="sideNav" class="sidebar" style="display:none">
    <h2>NAWAWI PRO</h2>
    <button onclick="changeTab('attendance')" id="btn-att"><i class="fas fa-calendar-check"></i> Attendance</button>
    <button onclick="changeTab('fee')" id="btn-fee"><i class="fas fa-wallet"></i> Fee Management</button>
    <button onclick="changeTab('exam')" id="btn-exam"><i class="fas fa-chart-line"></i> Exams & Ranking</button>
    <button onclick="openAddStudent()"><i class="fas fa-user-plus"></i> Add New Student</button>
    <div style="margin-top: 100px; padding: 10px;">
        <button onclick="location.reload()" style="color: #f87171;"><i class="fas fa-power-off"></i> Logout System</button>
    </div>
</div>

<div id="mainView" class="main-content" style="display:none">
    <div id="dynamicContent"></div>
</div>

<script>
    let currentUserRole = '';

    async function processLogin() {
        const body = { role: loginRole.value, id: loginID.value, pass: loginPass.value };
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if(data.success) {
            currentUserRole = data.role;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('sideNav').style.display = 'block';
            document.getElementById('mainView').style.display = 'block';
            if(currentUserRole === 'admin') changeTab('attendance'); else showStudentPanel(data.data);
        } else {
            alert("Login Failed: Hubi NBS Code-ka ama Password-ka!");
        }
    }

    function changeTab(type) {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card">
                <h3 style="margin-top:0">Maamulka: ${type.toUpperCase()}</h3>
                <div style="display:flex; gap:15px; align-items:end;">
                    <div style="flex:1">
                        Fasalka: 
                        <select id="selClass">
                            <option value="9">Fasalka 9aad</option>
                            <option value="10">Fasalka 10aad</option>
                            <option value="11">Fasalka 11aad</option>
                            <option value="12">Fasalka 12aad</option>
                        </select>
                    </div>
                    <div style="flex:1">
                        Section: 
                        <select id="selSec">
                            <option value="A">Section A</option>
                            <option value="B">Section B</option>
                            <option value="C">Section C</option>
                        </select>
                    </div>
                    <button class="btn-p" style="width:auto; margin:0; padding:12px 30px" onclick="loadStudentList('${type}')">Show List</button>
                </div>
            </div>
            <div id="listContainer"></div>
        `;
    }

    async function loadStudentList(type) {
        const res = await fetch(`/api/students/${selClass.value}/${selSec.value}`);
        const students = await res.json();
        let html = `<div class="card"><table><tr><th>Magaca Ardayga</th>`;

        if(type === 'attendance') {
            html += `<th>Status</th><th>Save</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td><select id="att-${s.nbsCode}"><option value="P">P (Jooga)</option><option value="A">A (Ma Joogo)</option></select></td>
                <td><button onclick="quickSave('${s.nbsCode}', 'att')">Save</button></td></tr>`;
            });
        } else if(type === 'fee') {
            html += `<th>Lacagta ($)</th><th>Balance</th><th>Action</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td>$${s.fees.paid}</td><td>$${1200 - s.fees.paid}</td>
                <td><button onclick="quickSave('${s.nbsCode}', 'fee')">Update Fee</button></td></tr>`;
            });
        } else if(type === 'exam') {
            html += `<th>Average</th><th>Rank</th><th>Action</th></tr>`;
            students.sort((a,b) => (b.exam.average || 0) - (a.exam.average || 0));
            students.forEach((s, i) => {
                html += `<tr><td>${s.fullName}</td><td>${s.exam.average || 0}%</td><td>#${i+1}</td>
                <td><button onclick="editGrades('${s.nbsCode}')">Edit 12 Subjects</button></td></tr>`;
            });
        }
        document.getElementById('listContainer').innerHTML = html + `</table></div>`;
    }

    async function quickSave(id, mode) {
        let payload = { nbsCode: id };
        if(mode === 'att') payload.attendance = [{ date: new Date().toLocaleDateString(), status: document.getElementById(`att-${id}`).value }];
        if(mode === 'fee') {
            const val = prompt("Geli cadadka lacagta la bixiyey ($):");
            if(val === null) return;
            payload.fees = { paid: Number(val) };
        }
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("Waa lagu guulaystay!");
        if(mode === 'fee') loadStudentList('fee');
    }

    function openAddStudent() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card" style="max-width: 600px; margin: auto;">
                <h3>Diiwaangeli Arday Cusub</h3>
                <div class="grid-2">
                    <div>NBS Code: <input id="nc" placeholder="Tusaale: NBS001"></div>
                    <div>Magaca: <input id="nn" placeholder="Magaca Saddexan"></div>
                </div>
                <div class="grid-2">
                    <div>Hooyada: <input id="nm" placeholder="Magaca Hooyada"></div>
                    <div>Phone: <input id="np" placeholder="Telefoonka"></div>
                </div>
                <div class="grid-2">
                    <div>Fasalka: <select id="ncl"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select></div>
                    <div>Section: <select id="nsc"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select></div>
                </div>
                <button class="btn-p" onclick="saveNewStudent()">Diiwaangeli</button>
            </div>`;
    }

    async function saveNewStudent() {
        const payload = { nbsCode: nc.value, fullName: nn.value, motherName: nm.value, parentPhone1: np.value, class: ncl.value, section: nsc.value };
        const res = await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if(res.ok) { alert("Ardayga waa la xareeyey!"); changeTab('attendance'); }
    }

    async function editGrades(id) {
        const res = await fetch(`/api/student/${id}`);
        const s = await res.json();
        const subjects = ["Math", "English", "Arabic", "Islamic", "Physics", "Chemistry", "Biology", "History", "Geography", "Somali", "ICT", "Business"];
        
        let inputs = subjects.map((name, i) => {
            let score = (s.exam.subjects.find(x => x.name === name) || {score: 0}).score;
            return `<div><label>${name}</label><input id="s-${i}" type="number" value="${score}"></div>`;
        }).join('');

        document.getElementById('dynamicContent').innerHTML = `
            <div class="card">
                <h3>Natiijada: ${s.fullName}</h3>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px">${inputs}</div>
                <button class="btn-p" onclick="finalizeGrades('${id}')">Save & Calculate Average</button>
            </div>`;
    }

    async function finalizeGrades(id) {
        const subjects = ["Math", "English", "Arabic", "Islamic", "Physics", "Chemistry", "Biology", "History", "Geography", "Somali", "ICT", "Business"];
        let examData = [];
        let total = 0;
        for(let i=0; i<12; i++) {
            let val = Number(document.getElementById(`s-${i}`).value);
            examData.push({ name: subjects[i], score: val });
            total += val;
        }
        let avg = (total / 12).toFixed(2);
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nbsCode: id, exam: { subjects: examData, average: avg } })
        });
        alert("Grades Updated!");
        changeTab('exam');
    }

    function showStudentPanel(s) {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card" style="text-align:center;">
                <h1>Ku soo dhowaw, ${s.fullName}</h1>
                <p>NBS ID: ${s.nbsCode} | Fasal: ${s.class}${s.section}</p>
                <div class="grid-2">
                    <div class="card" style="background:var(--primary); color:white"><h3>AVERAGE</h3><h2>${s.exam.average || 0}%</h2></div>
                    <div class="card"><h3>FEES</h3><h2 style="color:${s.fees.paid >= 1200 ? 'green':'red'}">${s.fees.paid >= 1200 ? 'PAID':'UNPAID'}</h2></div>
                </div>
            </div>`;
    }
</script>
</body>
</html>
