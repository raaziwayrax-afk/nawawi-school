1<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBS School Management</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); }
        
        /* Sidebar Styles */
        .sidebar { width: 250px; background: var(--primary); color: white; height: 100vh; padding: 20px; position: fixed; }
        .sidebar h2 { border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .nav-btn { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; 
                   background: transparent; color: white; text-align: left; cursor: pointer; transition: 0.3s; }
        .nav-btn:hover { background: var(--secondary); }

        /* Main Content */
        .main { margin-left: 270px; padding: 30px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; }
        
        input, select { padding: 12px; margin: 10px 0; width: 100%; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .save-btn { background: var(--secondary); color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>NBS System</h2>
        <button class="nav-btn" onclick="showPage('add')">➕ Add New Student</button>
        <button class="nav-btn" onclick="showPage('attendance')">📝 Attendance</button>
        <button class="nav-btn" onclick="showPage('exam')">📊 Exam Results</button>
    </div>

    <div class="main" id="app">
        <div class="card">
            <h1>Ku soo dhowaw NBS</h1>
            <p>Fadlan menu-ka dhinaca bidix ka dooro qaybta aad rabto.</p>
        </div>
    </div>

    <script>
        // 1. Shaqada lagu kala beddelayo boggaga
        function showPage(page) {
            let content = '';
            if (page === 'add') {
                content = `
                <div class="card">
                    <h2>Diiwaangeli Arday Cusub</h2>
                    <input type="text" id="nbsCode" placeholder="Geli ID (tusaale: 101)">
                    <input type="text" id="fullName" placeholder="Magaca oo dhammaystiran">
                    <select id="class"><option value="9aad">9aad</option><option value="12aad">12aad</option></select>
                    <select id="section"><option value="A">A</option><option value="B">B</option></select>
                    <button class="save-btn" onclick="saveData()">💾 Diiwaangeli</button>
                </div>`;
            } else {
                content = `
                <div class="card">
                    <h2>Qaybta ${page.toUpperCase()}</h2>
                    <select id="fClass"><option value="9aad">9aad</option><option value="12aad">12aad</option></select>
                    <select id="fSection"><option value="A">A</option><option value="B">B</option></select>
                    <button class="save-btn" onclick="fetchStudents()">🔍 Show Students</button>
                    <div id="listArea"></div>
                </div>`;
            }
            document.getElementById('app').innerHTML = content;
        }

        // 2. Shaqada Xogta loogu dirayo Backend-ka (SAVE)
        async function saveData() {
            const studentData = {
                nbsCode: document.getElementById('nbsCode').value,
                fullName: document.getElementById('fullName').value,
                class: document.getElementById('class').value,
                section: document.getElementById('section').value
            };

            if(!studentData.nbsCode || !studentData.fullName) return alert("Fadlan buuxi meelaha bannaan!");

            try {
                const response = await fetch('/api/admin/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });
                const result = await response.json();
                if(result.success) {
                    alert("✅ Ardayga waa la keydiyey!");
                    document.getElementById('nbsCode').value = '';
                    document.getElementById('fullName').value = '';
                }
            } catch (err) { alert("❌ Cilad ayaa ka dhacday keydinta!"); }
        }

        // 3. Shaqada Xogta looga soo qaadayo Backend-ka (FETCH)
        async function fetchStudents() {
            const cls = document.getElementById('fClass').value;
            const sec = document.getElementById('fSection').value;
            const listArea = document.getElementById('listArea');

            listArea.innerHTML = "Raadinaya...";

            try {
                const response = await fetch(`/api/students/${cls}/${sec}`);
                const students = await response.json();

                if (students.length === 0) {
                    listArea.innerHTML = "<p style='color:red; margin-top:20px;'>❌ Arday lama helin fasalkan!</p>";
                    return;
                }

                let table = `<table><tr><th>Magaca</th><th>ID (Code)</th></tr>`;
                students.forEach(s => {
                    table += `<tr><td>${s.fullName}</td><td>${s.nbsCode}</td></tr>`;
                });
                table += `</table>`;
                listArea.innerHTML = table;

            } catch (err) { listArea.innerHTML = "Cilad ayaa dhacday!"; }
        }
    </script>
</body>
</html>
