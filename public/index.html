<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi School System | Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nav: #0f172a; --accent: #2563eb; --bg: #f1f5f9; }
        body { font-family: sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--nav); color: white; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { color: var(--accent); text-align: center; margin-bottom: 30px; }
        .sidebar button { width: 100%; padding: 12px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-size: 15px; }
        .sidebar button:hover { background: var(--accent); color: white; }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-p { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        #loginPortal { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loginPortal">
    <div class="card" style="width:340px; text-align:center;">
        <h2 style="margin-top:0">NBS LOGIN</h2>
        <select id="role"><option value="admin">Admin</option><option value="student">Arday</option></select>
        <input id="uID" placeholder="NBS Code ama Admin ID">
        <input id="uPass" type="password" placeholder="Password">
        <button class="btn-p" onclick="handleLogin()">Giri Portal-ka</button>
    </div>
</div>

<div id="sideNav" class="sidebar" style="display:none">
    <h2>NAWAWI PRO</h2>
    <button onclick="nav('attendance')"><i class="fas fa-calendar-alt"></i> Attendance</button>
    <button onclick="nav('fee')"><i class="fas fa-money-bill-wave"></i> Fee Management</button>
    <button onclick="nav('exam')"><i class="fas fa-trophy"></i> Exam & Ranking</button>
    <button onclick="showAddForm()"><i class="fas fa-user-plus"></i> Add Student</button>
    <button onclick="location.reload()" style="color:#ef4444; margin-top:100px;"><i class="fas fa-power-off"></i> Logout</button>
</div>

<div id="mainView" class="main" style="display:none">
    <div id="dynamicContent"></div>
</div>

<script>
    let activeRole = '';

    async function handleLogin() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: role.value, id: uID.value, pass: uPass.value})
        });
        const data = await res.json();
        if(data.success) {
            activeRole = data.role;
            document.getElementById('loginPortal').style.display = 'none';
            document.getElementById('sideNav').style.display = 'block';
            document.getElementById('mainView').style.display = 'block';
            if(activeRole === 'admin') nav('attendance'); else showStudentDashboard(data.data);
        } else alert("Macluumaad Khaldan!");
    }

    function nav(type) {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card">
                <h3>Maamulka ${type.toUpperCase()}</h3>
                <div style="display:flex; gap:10px; align-items:end;">
                    <div style="flex:1">Fasalka: <select id="fC"><option value="9">9aad</option><option value="12">12aad</option></select></div>
                    <div style="flex:1">Section: <select id="fS"><option value="A">A</option><option value="B">B</option></select></div>
                    <button onclick="loadList('${type}')" style="padding:10px; cursor:pointer;">Show List</button>
                </div>
            </div>
            <div id="listArea"></div>
        `;
    }

    async function loadList(type) {
        const res = await fetch(`/api/students/${fC.value}/${fS.value}`);
        const students = await res.json();
        let html = `<div class="card"><table><tr><th>Magaca</th>`;
        
        if(type === 'attendance') {
            html += `<th>Status Today</th><th>Action</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td><select id="at-${s.nbsCode}"><option value="P">P</option><option value="A">A</option></select></td>
                <td><button onclick="saveAdminData('${s.nbsCode}', 'att')">Save</button></td></tr>`;
            });
        } else if(type === 'fee') {
            html += `<th>Status</th><th>Paid</th><th>Action</th></tr>`;
            students.forEach(s => {
                let status = s.fees.paid >= s.fees.total ? "Paid" : "Unpaid";
                html += `<tr><td>${s.fullName}</td><td>${status}</td><td>$${s.fees.paid}</td><td><button onclick="saveAdminData('${s.nbsCode}', 'fee')">Update Fee</button></td></tr>`;
            });
        } else if(type === 'exam') {
            html += `<th>Average</th><th>Rank</th><th>Action</th></tr>`;
            students.sort((a,b) => (b.exam.average || 0) - (a.exam.average || 0));
            students.forEach((s, i) => {
                html += `<tr><td>${s.fullName}</td><td>${s.exam.average || 0}%</td><td>#${i+1}</td><td><button onclick="editExam('${s.nbsCode}')">Edit 12 Subjects</button></td></tr>`;
            });
        }
        document.getElementById('listArea').innerHTML = html + `</table></div>`;
    }

    async function saveAdminData(id, mode) {
        let payload = { nbsCode: id };
        if(mode === 'att') {
            payload.attendance = [{ date: new Date().toLocaleDateString(), status: document.getElementById(`at-${id}`).value }];
        } else if(mode === 'fee') {
            const amount = prompt("Geli lacagta:");
            if(!amount) return;
            payload.fees = { paid: Number(amount) };
        }
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("Waa la keydiyey!");
        if(mode === 'fee') loadList('fee');
    }

    function showAddForm() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card" style="max-width:500px; margin:auto">
                <h3>Arday Cusub</h3>
                <input id="nc" placeholder="NBS Code">
                <input id="nn" placeholder="Magaca Saddexan">
                <input id="nm" placeholder="Magaca Hooyada">
                <input id="np" placeholder="Phone">
                <button class="btn-p" onclick="submitNew()">Save Student</button>
            </div>`;
    }

    async function submitNew() {
        const payload = { nbsCode: nc.value, fullName: nn.value, motherName: nm.value, parentPhone1: np.value, class: "9", section: "A" };
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("Waa la keydiyey!");
        nav('attendance');
    }

    async function editExam(id) {
        const res = await fetch(`/api/student/${id}`);
        const s = await res.json();
        let subs = s.exam.subjects;
        let inputs = subs.map((sub, i) => `
            <div style="display:flex; gap:10px; margin-top:5px">
                <input id="sn-${i}" value="${sub.name}" style="flex:2">
                <input id="ss-${i}" type="number" value="${sub.score}" style="flex:1">
            </div>
        `).join('');
        document.getElementById('dynamicContent').innerHTML = `<div class="card"><h3>Edit Exam: ${s.fullName}</h3>${inputs}<button class="btn-p" onclick="saveExamResults('${id}')">Save & Rank</button></div>`;
    }

    async function saveExamResults(id) {
        let subjects = [];
        for(let i=0; i<12; i++){
            subjects.push({ name: document.getElementById(`sn-${i}`).value, score: Number(document.getElementById(`ss-${i}`).value) });
        }
        let average = (subjects.reduce((a,b) => a + b.score, 0) / 12).toFixed(2);
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nbsCode: id, exam: { subjects, average } })
        });
        alert("Natiijada waa la keydiyey!");
        nav('exam');
    }

    function showStudentDashboard(s) {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card">
                <h1>Ku soo dhowaw, ${s.fullName}</h1>
                <p>NBS Code: ${s.nbsCode}</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="card">Average: ${s.exam.average || 0}%</div>
                    <div class="card">Fee Status: ${s.fees.paid >= s.fees.total ? 'Paid' : 'Unpaid'}</div>
                </div>
            </div>`;
    }
</script>
</body>
</html>
