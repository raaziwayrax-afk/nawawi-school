<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>NBS School Management</title>
    <style>
        :root { --p: #2c3e50; --s: #3498db; --w: #ffffff; --r: #e74c3c; --g: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; }
        .login-box { width: 380px; margin: 80px auto; background: var(--w); padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .sidebar { width: 250px; background: var(--p); color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-left: 280px; padding: 30px; }
        .card { background: var(--w); padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--s); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        @media print { .sidebar, button { display: none; } .main { margin: 0; width: 100%; } }
    </style>
</head>
<body>

<div id="loginPage" class="login-box">
    <h2 style="text-align:center;">NBS PORTAL</h2>
    <select id="role"><option value="admin">Admin Portal</option><option value="student">Student Portal</option></select>
    <input id="user" placeholder="NBS Code ama Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">GAL PORTAL-KA</button>
</div>

<div id="adminPanel" style="display:none; width: 100%;">
    <div class="sidebar">
        <h3>NBS ADMIN</h3>
        <button onclick="showAdmin('add')">➕ Add Student</button>
        <button onclick="showAdmin('att')">📝 Attendance</button>
        <button onclick="showAdmin('fees')">💰 Fees & Payment</button>
        <button onclick="showAdmin('exam')">📊 Exam Management</button>
        <button style="background:var(--r); margin-top:50px;" onclick="location.reload()">Logout</button>
    </div>
    <div class="main" id="adminContent"></div>
</div>

<div id="studentPanel" style="display:none; width: 100%;">
    <div class="sidebar" style="background:#34495e;">
        <h3>STUDENT PORTAL</h3>
        <button onclick="stdDash()">📊 My Dashboard</button>
        <button onclick="stdExams()">📝 My Results</button>
        <button style="background:var(--r); margin-top:50px;" onclick="location.reload()">Logout</button>
    </div>
    <div class="main" id="stdContent"></div>
</div>

<script>
    let activeUser = null;

    // --- FETCH: LOGIN ---
    async function login() {
        const role = document.getElementById('role').value;
        const username = document.getElementById('user').value;
        const password = document.getElementById('pass').value;

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password, role})
        });
        const data = await res.json();

        if(data.success) {
            document.getElementById('loginPage').style.display = 'none';
            if(data.role === 'admin') {
                document.getElementById('adminPanel').style.display = 'flex';
                showAdmin('add');
            } else {
                activeUser = data.data;
                document.getElementById('studentPanel').style.display = 'flex';
                stdDash();
            }
        } else alert(data.message);
    }

    function showAdmin(page) {
        let html = '';
        if(page === 'add') {
            html = `<div class="card"><h2>➕ Add Student</h2>
                <input id="nbs" placeholder="NBS/101">
                <input id="name" placeholder="Magaca oo Dhammaystiran">
                <select id="cls"><option value="9">9aad</option><option value="12">12aad</option></select>
                <select id="sec"><option value="A">A</option><option value="B">B</option></select>
                <button onclick="saveStudent()">💾 DIIWAANGELI</button></div>`;
        } else {
            html = `<div class="card"><h2>${page.toUpperCase()}</h2>
                <div style="display:flex; gap:10px;">
                    <select id="fCls"><option value="9">9aad</option><option value="12">12aad</option></select>
                    <select id="fSec"><option value="A">A</option><option value="B">B</option></select>
                    <button onclick="fetchList('${page}')">🔍 SOO BANDHIG</button>
                </div>
                <div id="listArea"></div></div>`;
        }
        document.getElementById('adminContent').innerHTML = html;
    }

    // --- FETCH: SAVE STUDENT ---
    async function saveStudent() {
        const nbs = document.getElementById('nbs').value;
        const name = document.getElementById('name').value;
        if(!nbs || !name) return alert("Fadlan buuxi xogta!");

        await fetch('/api/admin/save', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({
                nbsCode: nbs,
                fullName: name,
                class: document.getElementById('cls').value,
                section: document.getElementById('sec').value
            }) 
        });
        alert("Waa la keydiyey!");
    }

    // --- FETCH: GET LIST & PRINT ---
    async function fetchList(type) {
        const cls = document.getElementById('fCls').value;
        const sec = document.getElementById('fSec').value;
        const res = await fetch(`/api/students/${cls}/${sec}`);
        const students = await res.json();
        
        let html = `<table><tr><th>NBS Code</th><th>Magaca</th><th>Action</th></tr>`;
        students.forEach(s => {
            html += `<tr><td>${s.nbsCode}</td><td>${s.fullName}</td><td>`;
            if(type === 'att') html += `<button onclick="updateAtt('${s.nbsCode}', 'Present')" style="background:var(--g); width:40px;">P</button> <button onclick="updateAtt('${s.nbsCode}', 'Absent')" style="background:var(--r); width:40px;">A</button>`;
            if(type === 'fees') html += `$${s.fees.paid} <button onclick="payFee('${s.nbsCode}', ${s.fees.paid})" style="width:60px;">Pay</button>`;
            if(type === 'exam') html += `<button onclick="addMark('${s.nbsCode}')" style="width:80px;">Marks</button>`;
            html += `</td></tr>`;
        });
        document.getElementById('listArea').innerHTML = html + `</table><br><button onclick="window.print()">🖨️ DAABAC (PRINT)</button>`;
    }

    // --- FETCH: UPDATE DATA ---
    async function updateAtt(nbsCode, status) {
        const date = new Date().toLocaleDateString();
        await fetch('/api/admin/save', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ nbsCode, $push: { attendance: { date, status } } }) 
        });
        alert("Xadiriska waa la qaaday!");
    }

    async function payFee(nbsCode, current) {
        const amount = prompt("Lacagta ($):");
        if(amount) {
            await fetch('/api/admin/save', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ nbsCode, "fees.paid": (parseInt(current) + parseInt(amount)) }) 
            });
            alert("Lacagta waa la cusubaysiiyey!");
            fetchList('fees');
        }
    }

    function stdDash() {
        document.getElementById('stdContent').innerHTML = `<div class="card"><h1>Soo dhawoow, ${activeUser.fullName}</h1><p>NBS Code: ${activeUser.nbsCode}</p></div>`;
    }
</script>
</body>
</html>
