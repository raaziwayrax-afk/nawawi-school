<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>NBS School Management</title>
    <style>
        :root { --p: #2c3e50; --s: #3498db; --w: #ffffff; --r: #e74c3c; --g: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; }
        .login-box { width: 380px; margin: 80px auto; background: var(--w); padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .sidebar { width: 250px; background: var(--p); color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-left: 280px; padding: 30px; }
        .card { background: var(--w); padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--s); color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        .perc-badge { font-size: 24px; color: var(--s); font-weight: bold; }
    </style>
</head>
<body>

<div id="loginPage" class="login-box">
    <h2 style="text-align:center;">NBS PORTAL</h2>
    <select id="role"><option value="admin">Admin Portal</option><option value="student">Student Portal</option></select>
    <input id="user" placeholder="NBS Code ama Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">GAL PORTAL-KA</button>
</div>

<div id="adminPanel" style="display:none; width: 100%;">
    <div class="sidebar">
        <h3>NBS ADMIN</h3>
        <button onclick="showAdmin('add')">➕ Add Student</button>
        <button onclick="showAdmin('att')">📝 Attendance (A/B)</button>
        <button onclick="showAdmin('fees')">💰 Fees & Payment</button>
        <button onclick="showAdmin('exam')">📊 Exam Management</button>
        <button style="background:var(--r); margin-top:50px;" onclick="location.reload()">Logout</button>
    </div>
    <div class="main" id="adminContent"></div>
</div>

<div id="studentPanel" style="display:none; width: 100%;">
    <div class="sidebar" style="background:#34495e;">
        <h3>STUDENT PORTAL</h3>
        <button onclick="stdDash()">📊 My Dashboard</button>
        <button onclick="stdExams()">📝 My Results</button>
        <button onclick="stdFees()">💰 My Fees</button>
        <button style="background:var(--r); margin-top:50px;" onclick="location.reload()">Logout</button>
    </div>
    <div class="main" id="stdContent"></div>
</div>

<script>
    let activeUser = null;
    const subjects = ["Math", "English", "Arabic", "Somali", "Islamic", "Biology", "Chemistry", "Physics", "Geography", "History", "ICT"];

    async function login() {
        const role = document.getElementById('role').value;
        const username = document.getElementById('user').value;
        const password = document.getElementById('pass').value;

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password, role})
        });
        const data = await res.json();

        if(data.success) {
            document.getElementById('loginPage').style.display = 'none';
            if(data.role === 'admin') {
                document.getElementById('adminPanel').style.display = 'flex';
                showAdmin('add');
            } else {
                activeUser = data.data;
                document.getElementById('studentPanel').style.display = 'flex';
                stdDash();
            }
        } else alert(data.message);
    }

    // --- ADMIN FUNCTIONS ---
    function showAdmin(page) {
        let html = '';
        if(page === 'add') {
            html = `<div class="card"><h2>Add New Student</h2>
                <input id="nbs" placeholder="NBS/100/2026">
                <input id="name" placeholder="Magaca oo Dhammaystiran">
                <select id="cls"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select>
                <select id="sec"><option value="A">A</option><option value="B">B</option></select>
                <button onclick="saveStudent()">💾 DIIWAANGELI</button></div>`;
        } else {
            html = `<div class="card"><h2>${page.toUpperCase()} - Dooro Fasalka</h2>
                <select id="fCls"><option value="9">9aad</option><option value="12">12aad</option></select>
                <select id="fSec"><option value="A">A</option><option value="B">B</option></select>
                <button onclick="fetchList('${page}')">🔍 SOO BANDHIG</button>
                <div id="listArea"></div></div>`;
        }
        document.getElementById('adminContent').innerHTML = html;
    }

    async function saveStudent() {
        const data = {
            nbsCode: document.getElementById('nbs').value,
            fullName: document.getElementById('name').value,
            class: document.getElementById('cls').value,
            section: document.getElementById('sec').value
        };
        await fetch('/api/admin/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("Waa la keydiyey!");
    }

    // --- STUDENT FUNCTIONS ---
    function stdDash() {
        const total = activeUser.attendance.length;
        const present = activeUser.attendance.filter(a => a.status === 'Present').length;
        const perc = total > 0 ? ((present / total) * 100).toFixed(1) : 0;

        document.getElementById('stdContent').innerHTML = `
            <div class="card"><h1>Dashboard-ka Ardayga</h1>
                <div style="display:flex; gap:20px;">
                    <div class="card" style="flex:1; text-align:center;"><h3>Xadiriska (Attendance)</h3><div class="perc-badge">${perc}%</div></div>
                    <div class="card" style="flex:1; text-align:center;"><h3>Xaaladda Lacagta</h3><h2 style="color:${activeUser.fees.paid >= activeUser.fees.total ? 'var(--g)' : 'var(--r)'}">${activeUser.fees.paid >= activeUser.fees.total ? 'BIXIYEY' : 'MA BIXIN'}</h2></div>
                </div>
            </div>`;
    }

    function stdExams() {
        let html = `<div class="card"><h2>Natiijada Imtixaanka (12 Maado)</h2><table><tr><th>Maadada</th><th>Dhibcaha</th></tr>`;
        subjects.forEach(s => html += `<tr><td>${s}</td><td>-</td></tr>`);
        document.getElementById('stdContent').innerHTML = html + `</table></div>`;
    }
</script>
</body>
</html>
