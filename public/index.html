<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>NBS Portal | Full System</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
        .sidebar { width: 260px; background: var(--primary); color: white; display: none; flex-direction: column; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid #34495e; transition: 0.3s; }
        .nav-item:hover { background: #34495e; border-left: 5px solid var(--accent); }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: bold; cursor: pointer; border: none; }
        .status-btn { border-radius: 20px; width: auto; padding: 5px 15px; font-size: 12px; }
        .hidden { display: none; }
        #loginOverlay { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="box" style="width: 350px; text-align: center;">
        <h2 style="color: var(--primary);">UOB PORTAL</h2>
        <select id="l-role"><option value="admin">Admin Access</option><option value="student">Student Portal</option></select>
        <input id="l-u" placeholder="Roll Number / Admin">
        <input id="l-p" type="password" placeholder="Password">
        <button onclick="handleLogin()">Sign In</button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div style="padding: 25px; text-align: center; border-bottom: 1px solid #34495e;"><h3>NBS SYSTEM</h3></div>
    <div class="admin-only">
        <div class="nav-item" onclick="nav('dash')">📊 Dashboard</div>
        <div class="nav-item" onclick="nav('add')">📝 Add Student</div>
        <div class="nav-item" onclick="nav('fee')">💰 Fee Management</div>
        <div class="nav-item" onclick="nav('exam')">📚 Exam Center</div>
        <div class="nav-item" onclick="nav('att')">📅 Attendance</div>
    </div>
    <div class="student-only hidden">
        <div class="nav-item" onclick="nav('s-profile')">👤 My Dashboard</div>
    </div>
    <button onclick="location.reload()" style="margin-top: auto; background: var(--danger);">Logout</button>
</div>

<div class="main" id="app" style="display: none;">
    <section id="dash" class="view">
        <div class="box">
            <h3>Admin Dashboard Overview</h3>
            <select id="d-grade" onchange="loadAdminDash(this.value)"><option>Select Grade</option><option value="9">9aad</option><option value="12">12aad</option></select>
            <div id="student-list-dash"></div>
        </div>
    </section>

    <section id="add" class="view hidden">
        <div class="box">
            <h3>Register New Student</h3>
            <div class="grid">
                <input id="f-name" placeholder="Full Name (Saddexan)">
                <input id="m-name" placeholder="Mother Name (Saddexan)">
                <input id="f-phone" placeholder="Father Phone">
                <input id="m-phone" placeholder="Mother Phone">
                <input id="r-num" placeholder="Roll Number">
                <select id="r-grade"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select>
            </div>
            <button onclick="saveNewStudent()">Save Records</button>
        </div>
    </section>

    <section id="att" class="view hidden">
        <div class="box">
            <h3>Daily Attendance (Automatic Date)</h3>
            <div id="att-list"></div>
        </div>
    </section>

    <section id="s-profile" class="view hidden">
        <div class="box" style="text-align: center;">
            <h2 id="sp-name"></h2>
            <p id="sp-roll" style="color: #666;"></p>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button class="status-btn" style="background: var(--accent);">Attendance: 100%</button>
                <button id="sp-fee" class="status-btn"></button>
            </div>
            <div id="sp-exams" style="margin-top: 30px; text-align: left;"></div>
        </div>
    </section>
</div>

<script>
    let currentUser = null;
    let studentsData = [];

    async function handleLogin() {
        const roll = document.getElementById('l-u').value;
        const pass = document.getElementById('l-p').value;
        const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({roll, pass}) });
        const data = await res.json();
        
        if(res.ok) {
            currentUser = data;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('app').style.display = 'block';
            
            if(data.role === 'admin') {
                document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
                nav('dash');
            } else {
                document.querySelectorAll('.admin-only').forEach(e => e.classList.add('hidden'));
                document.querySelectorAll('.student-only').forEach(e => e.classList.remove('hidden'));
                renderStudentProfile(data.data);
                nav('s-profile');
            }
        } else alert("Khald ayaa jira!");
    }

    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'att') loadAttendanceList();
    }

    async function saveNewStudent() {
        const body = {
            fullName: document.getElementById('f-name').value,
            motherName: document.getElementById('m-name').value,
            fatherPhone: document.getElementById('f-phone').value,
            motherPhone: document.getElementById('m-phone').value,
            examNumber: document.getElementById('r-num').value,
            grade: document.getElementById('r-grade').value
        };
        await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        alert("Waa la keydiyay!");
    }

    async function loadAdminDash(g) {
        const res = await fetch(`/api/filter?grade=${g}`);
        const data = await res.json();
        const div = document.getElementById('student-list-dash');
        div.innerHTML = data.map(s => `
            <div class="box" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${s.fullName}</b><br><small>${s.examNumber}</small></div>
                <button class="status-btn" style="background: var(--accent);">100% Present</button>
            </div>
        `).join('');
    }

    function renderStudentProfile(s) {
        document.getElementById('sp-name').innerText = s.fullName;
        document.getElementById('sp-roll').innerText = `Roll Number: ${s.examNumber}`;
        document.getElementById('sp-fee').innerText = s.feePaid ? "Fee: Paid ✅" : "Fee: Pending ❌";
        document.getElementById('sp-fee').style.background = s.feePaid ? 'var(--accent)' : 'var(--danger)';
        
        const examsHtml = `<h3>Exam Results (12 Subjects)</h3><div class="grid">` + 
            s.examScores.map(e => `<div class="box" style="padding:10px;">${e.subject}: <b>${e.score} (${e.gradeLetter})</b></div>`).join('') + `</div>`;
        document.getElementById('sp-exams').innerHTML = examsHtml;
    }

    async function loadAttendanceList() {
        // Halkan waxaa imaanaya nidaamka xadiriska labada waqti
        const res = await fetch('/api/filter?grade=9'); 
        const data = await res.json();
        const div = document.getElementById('att-list');
        const today = new Date().toLocaleDateString();
        div.innerHTML = `<h4>Date: ${today}</h4>` + data.map(s => `
            <div class="box" style="display:flex; justify-content:space-between;">
                <span>${s.fullName}</span>
                <div>
                    <button class="status-btn" onclick="mark('${s._id}', 'Morning')">Morning</button>
                    <button class="status-btn" onclick="mark('${s._id}', 'Afternoon')">Afternoon</button>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
